services:
  # База данных с поддержкой векторов
  db:
    image: pgvector/pgvector:pg17 # Официальный образ с уже встроенным pgvector
    container_name: my_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: knowledge_base
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Ваш Python-бэкенд (FastAPI)
  app:
    build: .
    container_name: fast_api_app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: